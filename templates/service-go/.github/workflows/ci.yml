name: CI
on: [push, pull_request]
# OIDC (Azure login, cosign keyless) and SARIF upload can only be granted by the
# caller — GitHub will not let the reusable workflow elevate these itself.
permissions:
  contents: read
  id-token: write
  security-events: write
jobs:
  golden-path:
    # Pin to a commit SHA of platform-golden-path when you adopt this template.
    uses: your-org/platform-golden-path/.github/workflows/golden-path.yml@<PIN-TO-COMMIT-SHA>
    with:
      service-name: service-go
    secrets: inherit
